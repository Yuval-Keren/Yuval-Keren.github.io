<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>System Architecture Diagram</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: #f0f2f5;
  color: #212529;
  padding: 24px 20px;
  min-height: 100vh;
}
.uml-root {
  max-width: 1040px;
  margin: 0 auto;
  background: #ffffff;
  padding: 28px 28px 32px;
  border-radius: 16px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
}
.app-header {
  margin-bottom: 22px;
  border-bottom: 2px solid #e9ecef;
  padding-bottom: 14px;
  display: flex;
  align-items: baseline;
  gap: 14px;
}
.app-header h1 {
  font-size: 20px;
  color: #212529;
  font-weight: 700;
  letter-spacing: -0.3px;
}
.app-header .subtitle {
  font-size: 13px;
  color: #868e96;
}
.layer-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
.layer-tab {
  padding: 7px 16px; border-radius: 20px; font-size: 13px; font-weight: 500;
  cursor: pointer; border: 1.5px solid #dee2e6; transition: all .15s ease-in-out;
  color: #6c757d; background: #f8f9fa;
  outline: none;
}
.layer-tab:hover { background: #e9ecef; color: #343a40; border-color: #ced4da; }
.layer-tab.active { color: #fff; border-color: transparent; }
.layer-tab[data-layer="gui"].active     { background: #0F6E56; }
.layer-tab[data-layer="app"].active     { background: #534AB7; }
.layer-tab[data-layer="services"].active{ background: #185FA5; }
.layer-tab[data-layer="domain"].active  { background: #993C1D; }
.layer-tab[data-layer="infra"].active   { background: #5F5E5A; }
.layer-desc {
  font-size: 13px; color: #495057; line-height: 1.6;
  margin-bottom: 18px; padding: 10px 14px;
  border-left: 4px solid #dee2e6;
  border-radius: 0 8px 8px 0;
  background: #f8f9fa;
}
.diagram-area { width: 100%; overflow-x: auto; }
.diagram-area svg { display: block; margin: 0 auto; }
.cls-card { cursor: pointer; }
.cls-card rect.cls-bg { transition: filter .15s; }
.cls-card:hover rect.cls-bg { filter: brightness(0.96); }
.cls-card text { pointer-events: none; }
.detail-panel {
  margin-top: 20px; padding: 18px 20px;
  border: 1px solid #dee2e6;
  border-radius: 10px; background: #f8f9fa;
  font-size: 13px; line-height: 1.6; display: none;
}
.detail-panel.show { display: block; }
.detail-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 12px; }
.detail-title { font-size: 17px; font-weight: 700; }
.detail-role { color: #6c757d; font-size: 12px; font-style: italic; }
.detail-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 24px; }
.detail-col-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: #868e96; margin-bottom: 4px; }
.detail-member { font-size: 12px; font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; padding: 3px 8px; border-radius: 5px; margin-bottom: 3px; }
.detail-member.field  { color: #185FA5; background: #e6f1fb; }
.detail-member.method { color: #2b6106; background: #edf7e6; }
.legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; font-size: 12px; color: #6c757d; }
.legend-item { display: flex; align-items: center; gap: 6px; }
.legend-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.stats-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 18px; }
.stat-chip {
  font-size: 12px; padding: 4px 10px; border-radius: 12px;
  background: #f1f3f5; color: #495057; border: 1px solid #dee2e6;
}
.stat-chip strong { color: #212529; }
</style>
</head>
<body>
<div class="uml-root">
  <div class="app-header">
    <h1>📐 System Architecture</h1>
    <span class="subtitle">Interactive UML Blueprint · Exam Scheduler</span>
  </div>

  <div id="totalCount" style="font-size:13px; color:#868e96; margin-bottom:10px;"></div>
  <div class="layer-tabs" id="tabs"></div>
  <div class="legend" id="legend"></div>
  <div class="layer-desc" id="layerDesc"></div>
  <div class="diagram-area" id="diagramArea"></div>
  <div class="detail-panel" id="detailPanel">
    <div class="detail-header">
      <div class="detail-title" id="dpTitle"></div>
      <div class="detail-role"  id="dpRole"></div>
    </div>
    <div class="detail-cols">
      <div>
        <div class="detail-col-label">Fields</div>
        <div id="dpFields"></div>
      </div>
      <div>
        <div class="detail-col-label">Methods</div>
        <div id="dpMethods"></div>
      </div>
    </div>
  </div>
</div>
<script>
const LAYERS = {
  gui: {
    label: "GUI Layer",
    color: "#0F6E56", light: "#F0FAF6", stroke: "#1D9E75",
    desc: "PyQt6 widgets, screens, and presenters. The GUI never touches domain objects directly — it reads ViewModels produced by the mapper and fires commands through AppController. Screens are registered in ScreenRouter and swapped via a QStackedWidget.",
    classes: [
      { id:"GuiMain",                  role:"Application entry point",
        fields:[],
        methods:["+main()"] },
      { id:"App",                      role:"Main QMainWindow",
        fields:["-_controller: AppController","-_router: ScreenRouter"],
        methods:["+__init__(controller)","+closeEvent(event)"] },
      { id:"ScreenRouter",             role:"Screen navigation manager",
        fields:["-_stack: QStackedWidget","-_screens: Dict","-_history: list"],
        methods:["+register(name,screen)","+show(name)","+back()"] },
      { id:"Screen",                   role:"Abstract base screen",
        fields:[],
        methods:["+on_enter()","+on_leave()"] },
      { id:"InputScreen",              role:"File load + config UI",
        fields:["-_presenter: InputScreenPresenter"],
        methods:["+on_enter()","+show_progress(n)","+show_done(n)"] },
      { id:"InputScreenPresenter",     role:"Input screen logic coordinator",
        fields:["-_view","-_controller","-_router","-_courses_loaded: bool","-_periods_loaded: bool"],
        methods:["+on_generate_clicked(ids)","+on_schedule_found(n)","+on_search_finished()","+on_open_program_dialog()"] },
      { id:"ActionBarWidget",          role:"File loader + run/cancel bar",
        fields:[],
        methods:["+set_ready()","+set_running(n)","+set_cancelled()"] },
      { id:"ProgramSelectorDialog",    role:"Program picker popup",
        fields:["-_selected_ids: List[str]"],
        methods:["+selected_ids(): List[str]","+exec()"] },
      { id:"ProgramSelectorCardWidget",role:"Single program toggle card",
        fields:["-_program_id: str","-_checked: bool"],
        methods:["+is_checked(): bool","+toggle()"] },
      { id:"OutputScreen",             role:"Schedule viewer screen",
        fields:["-_presenter: OutputScreenPresenter"],
        methods:["+on_enter()","+show_schedule(vm)","+show_period(vm)"] },
      { id:"OutputScreenPresenter",    role:"Output screen logic coordinator",
        fields:["-_view","-_controller","-_router","-_current_index: int","-_total: int","-_periods: PeriodNavigator"],
        methods:["+on_next()","+on_prev()","+on_page_flip(dir)","+on_export_pdf()","+on_period_apply(vms)"] },
      { id:"SolutionBarWidget",        role:"Nav + export + paging toolbar",
        fields:[],
        methods:["+set_count(n,total)","+set_page_info(page,total)"] },
      { id:"PeriodNavigator",          role:"Exam period navigation helper",
        fields:["-_periods: List[PeriodEditViewModel]","-_current_index: int"],
        methods:["+next()","+prev()","+current(): PeriodEditViewModel","+set_periods(vms)"] },
      { id:"CalendarEditorWidget",     role:"Period date exclusion editor",
        fields:["-_view_models: List[PeriodEditViewModel]"],
        methods:["+toggle_date_exclusion(date_str)","+get_view_models(): List[PeriodEditViewModel]"] },
      { id:"CalendarWidget",           role:"Month grid display",
        fields:[],
        methods:["+setup_month_grid(dates)","+display_assignments(items)","+set_date_excluded_style(date,on)"] },
      { id:"OutputCalendarWidget",     role:"Read-only output calendar",
        fields:[],
        methods:["+display_schedule(vm)"] },
      { id:"CourseListWidget",         role:"Scrollable course list panel",
        fields:["-_courses: List"],
        methods:["+load_courses(courses)","+selected_ids(): List[str]"] },
      { id:"HeaderWidget",             role:"App header / branding bar",
        fields:[],
        methods:["+set_title(text)"] },
      { id:"ExclusionModel",           role:"Calendar exclusion data model",
        fields:["-_excluded_dates: Set[str]"],
        methods:["+toggle(date_str)","+is_excluded(date_str): bool","+get_excluded(): Set[str]"] },
      { id:"SchedulePdfExporter",      role:"PDF export writer",
        fields:[],
        methods:["+export_schedule_pdf(view,idx,parent)","-_build_schedule_html(view)","-_write_html_to_pdf(html,path)"] },
    ]
  },
  app: {
    label: "App Layer",
    color: "#534AB7", light: "#F4F3FF", stroke: "#7F77DD",
    desc: "AppController receives GUI signals and delegates to ApplicationFacade. The facade orchestrates services without containing business logic. ViewModels and DTOs define data shapes crossing layer boundaries — the GUI never sees raw domain objects.",
    classes: [
      { id:"AppController",            role:"GUI command handler (QObject)",
        fields:["-_facade: ApplicationFacade","-_worker: SchedulerWorker","-_early_nav_fired: bool","-_progress_timer: QTimer"],
        methods:["+load_file(path,type,mode)","+generate_schedules(program_ids)","+cancel_scheduling()","+update_exam_periods(vms)","+get_schedule_view(index)","+get_loaded_courses()","+get_loaded_periods()","+get_mapper()","+get_page_info()","+on_app_closing()"] },
      { id:"ApplicationFacade",        role:"Service orchestrator",
        fields:["-_state: AppState","-_importer: FileImportService","-_scheduler: SchedulingService","-_exporter: ScheduleExportService","-_mapper: ViewModelMapper"],
        methods:["+import_file(request): ImportResult","+generate(program_ids): SchedulerWorker","+update_periods(vms)","+get_schedule_vm(index)","+export(index,path)","+get_loaded_courses()","+get_loaded_periods()","+get_mapper()","+load_page(page)","+get_page_info()"] },
      { id:"AppState",                 role:"Composite state root",
        fields:["-_input_state: InputDataState","-_schedule_state: ScheduleResultState"],
        methods:["+get_input_state()","+get_schedule_state()"] },
      { id:"ImportRequest",            role:"Value object — import params",
        fields:["+path: str","+file_type: str","+mode: ImportMode"],
        methods:[] },
      { id:"ImportResult",             role:"Value object — import outcome",
        fields:["+success: bool","+loaded_count: int","+errors: List[str]"],
        methods:["+has_errors()"] },
      { id:"ImportBoundary",           role:"ImportMode enum + interface",
        fields:["ImportMode.REPLACE","ImportMode.UPDATE"],
        methods:[] },
      { id:"ScheduleDTO",              role:"Picklable schedule transfer",
        fields:["+assignments: List[AssignmentDTO]","+total_assignments: int"],
        methods:[] },
      { id:"AssignmentDTO",            role:"Picklable assignment transfer",
        fields:["+course_id: str","+course_name: str","+instructor: str","+date: str","+semester: str","+moed: str","+program_requirements: List[Tuple]"],
        methods:[] },
      { id:"ScheduleDTOAdapter",       role:"Adapter: DTO → Domain shape",
        fields:["-_dto: ScheduleDTO"],
        methods:["+to_exam_schedule(): ExamSchedule"] },
      { id:"ScheduleViewModel",        role:"Display data for one schedule",
        fields:["+items: List[ScheduleItemViewModel]","+current_index: int","+total: int"],
        methods:["+is_empty(): bool"] },
      { id:"ScheduleItemViewModel",    role:"Display data for one exam",
        fields:["+date: str","+title: str","+subtitle: str","+tooltip: str"],
        methods:[] },
      { id:"CalendarViewModel",        role:"Display data for calendar view",
        fields:["+cells: List[CalendarCellViewModel]"],
        methods:[] },
      { id:"CalendarCellViewModel",    role:"Display data for one day",
        fields:["+date: str","+items: List[ScheduleItemViewModel]","+is_blocked: bool","+tooltip: str"],
        methods:[] },
      { id:"ProgramViewModel",         role:"Display data for program summary",
        fields:["+program_id: str","+display_name: str","+course_count: int"],
        methods:[] },
      { id:"ProgramCoursesViewModel",  role:"Program with expanded courses",
        fields:["+program_id: str","+program_name: str","+courses: List[CourseRowViewModel]"],
        methods:[] },
      { id:"CourseRowViewModel",       role:"Display data for one course row",
        fields:["+course_id: str","+course_name: str","+year: int","+semester: str","+requirement: str","+evaluation: str","+is_exam_relevant: bool"],
        methods:[] },
      { id:"PeriodEditViewModel",      role:"Display data for period editing",
        fields:["+semester: str","+moed: str","+start_date: str","+end_date: str","+excluded_dates: List[str]"],
        methods:[] },
      { id:"PeriodEditRequest",        role:"DTO — period edit request",
        fields:["+semester: str","+moed: str","+start_date: str","+end_date: str","+excluded_dates: List[str]"],
        methods:[] },
    ]
  },
  services: {
    label: "Services Layer",
    color: "#185FA5", light: "#EEF5FC", stroke: "#378ADD",
    desc: "Application services — each owns a single responsibility. They transform data, orchestrate domain calls, and communicate via DTOs and ViewModels. State sub-objects live here too: InputDataState owns the cache bridge; ScheduleResultState and its Hybrid subclass manage paged navigation.",
    classes: [
      { id:"FileImportService",        role:"Validate → cache? → parse → merge → persist",
        fields:["-_cache: InputCacheService","-_parser_factory: ParserFactory","-_merger: InputDataMerger","-_state: InputDataState","-_loaded_paths: Dict[str,str]"],
        methods:["+load_file(path,type,mode): ImportResult","-_loaded_count(file_type): int"] },
      { id:"InputCacheService",        role:"Cache load / persist facade",
        fields:["-_repository: IDataRepository","-_detector: FileChangeDetector"],
        methods:["+try_load(paths): DataCache|None","+persist(state,paths)"] },
      { id:"InputDataMerger",          role:"Merge parsed data into state",
        fields:["-_state: InputDataState","-_handlers: Dict"],
        methods:["+merge(data,mode,file_type)"] },
      { id:"SchedulingService",        role:"Build slots + spawn workers",
        fields:["-_repository: SQLiteScheduleRepository","-_slot_builder: SlotBuilder","-_worker: SchedulerWorker"],
        methods:["+build_slots(progs,courses,periods)","+generate_async(program_ids,courses,periods): SchedulerWorker","+cancel()"] },
      { id:"ScheduleExportService",    role:"Save / format schedules",
        fields:["-_writer: OutputWriter"],
        methods:["+save(schedule_dto,path)","+format(schedule_dto): str"] },
      { id:"ViewModelMapper",          role:"Domain → ViewModel transform",
        fields:[],
        methods:["+to_schedule_vm(dto,idx,total,progs)","+to_calendar_vm(dto)","+to_period_edit_vms(periods)","+to_program_vms(courses)","+to_program_courses_vm(courses)","-_item_from_assignment(a,progs)"] },
      { id:"InputDataState",           role:"Loaded input data holder",
        fields:["-_courses: List[Course]","-_periods: List[ExamPeriod]","-_selected_program_ids: List[str]"],
        methods:["+replace_courses(courses)","+replace_periods(periods)","+get_courses()","+get_periods()","+set_selected_programs(ids)","+get_selected_programs()","+apply_period_edits(vms)","+to_cache(): DataCache","+load_cache(cache)"] },
      { id:"ScheduleResultState",      role:"In-memory schedule results",
        fields:["-_schedules: List[ScheduleDTO]","-_current_index: int"],
        methods:["+set_schedules(s)","+add_schedule(dto)","+add_schedules_batch(batch)","+get_schedule(index)","+count()","+total_pages()","+load_page(page)","+is_first_window_ready()","+current_window_size()","+sqlite_count()"] },
      { id:"HybridScheduleResultState",role:"SQLite-backed paged results",
        fields:["-_repository: SQLiteScheduleRepository","-_window_size: int","-_current_page_idx: int"],
        methods:["+add_schedules_batch(batch_size)","+count()","+sqlite_count()","+is_first_window_ready()","+current_window_size()","+current_page","+total_pages()","+load_page(page)","+set_schedules(schedules)"] },
      { id:"SchedulerWorker",          role:"QThread — drains IPC queue to SQLite",
        fields:["-_queue: Queue","-_cancel_event: Event","-_processes: List[Process]","-_repository: SQLiteScheduleRepository"],
        methods:["+run()","+cancel()","-_handle_schedule_batch(payload)","-_handle_finished(payload)","-_handle_error(payload)","-_shutdown()"] },
    ]
  },
  domain: {
    label: "Domain Layer",
    color: "#993C1D", light: "#FAF1EE", stroke: "#D85A30",
    desc: "Pure Python — zero frameworks, zero I/O. The backtracking scheduler, conflict checkers, slot builder, observer interfaces, and domain entities live here. Nothing in this layer knows about PyQt, SQLite, or file formats.",
    classes: [
      { id:"Scheduler",                role:"Backtracking search engine",
        fields:["-_checkers: List[IConflictChecker]"],
        methods:["+generateSchedules(slots,observer,max_results)","-_backtrack(index,slots,schedule,observer,found_count,max_results)"] },
      { id:"SlotBuilder",              role:"Course → candidate slot list",
        fields:["-_period_map: dict","-_selected_set: Set[str]"],
        methods:["+build(courses): List[Slot]","-_buildRaw(courses)","-_score(slot)"] },
      { id:"Slot",                     role:"One exam event + candidate dates",
        fields:["+course: Course","+semester","+moed","+candidateDates: List[date]"],
        methods:[] },
      { id:"IConflictChecker",         role:"«interface» Conflict rule",
        fields:[],
        methods:["+check(assignment,schedule): bool"] },
      { id:"ProgramYearConflictChecker",role:"Program/year conflict rule",
        fields:["-_conflict_graph"],
        methods:["+precompute_conflicts(courses,programs)","+check(assignment,schedule): bool"] },
      { id:"MoedOrderChecker",         role:"Moed A must precede Moed B",
        fields:["-_moed_rank: dict"],
        methods:["+check(assignment,schedule): bool"] },
      { id:"IScheduleObserver",        role:"«interface» Observer contract",
        fields:[],
        methods:["+on_schedule_found(schedule)","+on_progress(value)","+should_cancel(): bool","+on_finished()","+on_error(msg)"] },
      { id:"CollectingScheduleObserver",role:"Collects all results in-memory",
        fields:["-_schedules: List"],
        methods:["+on_schedule_found(s)","+on_progress(v)","+should_cancel(): bool","+on_finished()","+get_schedules()"] },
      { id:"StreamingScheduleObserver",role:"Streams results directly to disk",
        fields:["-_output_path","-_writer"],
        methods:["+on_schedule_found(s)"] },
      { id:"Enums",                    role:"Shared enum definitions",
        fields:["EvalType","Semester (FALL,SPRI,SUMM)","Moed (ALEPH,BET)","Requirement (OBLIGATORY,ELECTIVE)"],
        methods:[] },
      { id:"Course",                   role:"Domain entity",
        fields:["+courseId: str","+name: str","+instructor: str","+evaluation: EvalType","+programEntries: List[ProgramEntry]"],
        methods:["+hasExam(): bool"] },
      { id:"ProgramEntry",             role:"Value object — program link",
        fields:["+programId: str","+year: int","+semester: Semester","+requirement: Requirement"],
        methods:[] },
      { id:"ExamPeriod",               role:"Domain entity",
        fields:["+semester","+moed","+startDate","+endDate","+excludedDates: Set[date]","+availableDates: List[date]"],
        methods:[] },
      { id:"ExamSchedule",             role:"Domain entity — assignment list",
        fields:["+assignments: List[ExamAssignment]"],
        methods:["+addAssignment(a)","+pop_last_assignment()","+getByDate(date)"] },
      { id:"ExamAssignment",           role:"Value object",
        fields:["+course","+date","+moed","+semester"],
        methods:[] },
    ]
  },
  infra: {
    label: "Infrastructure",
    color: "#5F5E5A", light: "#F4F4F3", stroke: "#888780",
    desc: "Everything touching disk, SQLite, multiprocessing IPC, file hashing, parsing, and validation. No business logic — pure I/O adapters the service layer depends on via interfaces. The parser factory, validators, and writers live here too.",
    classes: [
      { id:"SQLiteScheduleRepository", role:"Schedule persistence (SQLite)",
        fields:["-_db_path: str","-_total_count: int"],
        methods:["+insert_batch(batch)","+insert_compressed_batch(data,count)","+get_window(offset,limit): List[ScheduleDTO]","+count(): int","+clear()"] },
      { id:"QueueScheduleObserver",    role:"Observer → IPC queue adapter",
        fields:["-_queue: Queue","-_cancel_event: Event","-_buffer: List[ScheduleDTO]","-_batch_size: int"],
        methods:["+on_schedule_found(s)","-_flush_buffer()","+should_cancel(): bool","+on_finished()","+on_error(msg)"] },
      { id:"SchedulerProcessRunner",   role:"Worker process entry point",
        fields:["-_slots: List[Slot]","-_checkers: List","-_queue: Queue","-_cancel_event: Event"],
        methods:["+run()","-_create_observer()","-_create_scheduler()"] },
      { id:"DataCache",                role:"«dataclass» Serializable cache",
        fields:["+courses: List[CourseDict]","+periods: List[PeriodDict]","+source_hashes: dict","+schema_version: int"],
        methods:[] },
      { id:"DiskCacheRepository",      role:"Pickle-based cache on disk",
        fields:["-_cache_path: Path"],
        methods:["+save(cache)","+load(): DataCache"] },
      { id:"IDataRepository",          role:"«interface» Cache repo contract",
        fields:[],
        methods:["+save(cache)","+load(): DataCache"] },
      { id:"FileChangeDetector",       role:"Hash-based change detection",
        fields:[],
        methods:["+compute_hash(path): str","+compute_hashes(paths): dict","+has_changed(paths,stored): bool"] },
      { id:"FileParser",               role:"«abstract» File parser base",
        fields:[],
        methods:["+parse(file_path)","+validateSeparator(content,sep)"] },
      { id:"CoursesFileParser",        role:"Parses courses.txt",
        fields:[],
        methods:["+parse(file_path): List[Course]"] },
      { id:"ExamPeriodsFileParser",    role:"Parses periods.txt",
        fields:[],
        methods:["+parse(file_path): List[ExamPeriod]"] },
      { id:"ProgramsFileParser",       role:"Parses programs.txt",
        fields:[],
        methods:["+parse(file_path): List[str]"] },
      { id:"ParserFactory",            role:"Creates correct parser by type",
        fields:["-_REGISTRY: Dict[str,Type[FileParser]]"],
        methods:["+create(file_type): FileParser","+parse_files(mappings)","+register(type,cls)","+supported_types(): List[str]"] },
      { id:"FileValidator",            role:"File-level validation functions",
        fields:[],
        methods:["+validate_file_exists(path)","+validate_file_not_empty(path)","+validate_language(path)","+validate_all_files(paths)"] },
      { id:"IInputValidator",          role:"«interface» Input validator",
        fields:[],
        methods:["+validate(data): ValidationResult"] },
      { id:"ValidatorPipeline",        role:"Runs all validators in chain",
        fields:["-_validators: List[IInputValidator]"],
        methods:["+add(validator)","+validate(data,fail_fast): ValidationResult"] },
      { id:"MaxProgramsValidator",     role:"Max 5 programs guard",
        fields:["+MAX_PROGRAMS = 5"],
        methods:["+validate(data): ValidationResult"] },
      { id:"ProgramExistenceValidator",role:"Programs exist in master list",
        fields:["-_valid_ids: set"],
        methods:["+validate(data): ValidationResult"] },
      { id:"ValidationResult",         role:"«dataclass» Validation outcome",
        fields:["+is_valid: bool","+errors: List[str]"],
        methods:["+add_error(msg)","+merge(other)"] },
      { id:"OutputWriter",             role:"«abstract» Schedule writer",
        fields:[],
        methods:["+write(schedules,path)","+formatSchedule(schedule)"] },
      { id:"TextFileWriter",           role:"Writes schedules as .txt",
        fields:[],
        methods:["+write(schedules,path)","+formatSchedule(schedule): str"] },
    ]
  }
};

const LEGEND_ITEMS = [
  { color: "#0F6E56", label: "GUI" },
  { color: "#534AB7", label: "Application" },
  { color: "#185FA5", label: "Services" },
  { color: "#993C1D", label: "Domain" },
  { color: "#5F5E5A", label: "Infrastructure" },
];

// // Total class count displayed above the layer tabs.
const totalClasses = Object.values(LAYERS).reduce((s, l) => s + l.classes.length, 0);
document.getElementById('totalCount').textContent = `${totalClasses} classes total`;

// Legend
const legendEl = document.getElementById('legend');
LEGEND_ITEMS.forEach(l => {
  legendEl.innerHTML += `<span class="legend-item"><span class="legend-dot" style="background:${l.color}"></span>${l.label}</span>`;
});

// Tabs
let activeLayer = 'gui';
const tabsEl = document.getElementById('tabs');
layerEntries.forEach(([key, layer]) => {
  const btn = document.createElement('button');
  btn.className = 'layer-tab' + (key === activeLayer ? ' active' : '');
  btn.dataset.layer = key;
  btn.textContent = `${layer.label}  (${layer.classes.length})`;
  btn.onclick = () => setLayer(key);
  tabsEl.appendChild(btn);
});

function setLayer(key) {
  activeLayer = key;
  document.querySelectorAll('.layer-tab').forEach(t => t.classList.toggle('active', t.dataset.layer === key));
  document.getElementById('detailPanel').classList.remove('show');
  renderDiagram(key);
}

function renderDiagram(key) {
  const layer = LAYERS[key];
  document.getElementById('layerDesc').textContent = layer.desc;
  const classes = layer.classes;
  const COL = 4;
  const W = 176, GAP_X = 12, GAP_Y = 12, PAD_X = 8, PAD_Y = 14;
  const LINE_H = 11;
  const HEADER_H = 37;
  const DIVIDER_Y = 33;

  function cardHeight(cls) {
    const fc = Math.min(cls.fields.length, 2);
    const mc = Math.min(cls.methods.length, 3);
    const extra = (cls.fields.length > 2 ? 1 : 0) + (cls.methods.length > 3 ? 1 : 0);
    const total = fc + mc + extra;
    return HEADER_H + (total > 0 ? 6 + total * LINE_H + 4 : 8);
  }

  const rows = Math.ceil(classes.length / COL);
  const rowHeights = [];
  for (let r = 0; r < rows; r++) {
    let maxH = 0;
    for (let c = 0; c < COL; c++) {
      const idx = r * COL + c;
      if (idx < classes.length) maxH = Math.max(maxH, cardHeight(classes[idx]));
    }
    rowHeights.push(maxH);
  }

  const totalW = COL * W + (COL - 1) * GAP_X;
  const canvasW = 760;
  const startX = Math.max(PAD_X, (canvasW - totalW) / 2);
  const legendH = 26;
  const svgH = PAD_Y + legendH + rowHeights.reduce((a, h) => a + h + GAP_Y, 0) - GAP_Y + PAD_Y + 4;
  const svgW = canvasW;

  let svg = `<svg width="100%" viewBox="0 0 ${svgW} ${svgH}" role="img">`;
  svg += `<style>
    .cls-card text { font-family: -apple-system, sans-serif; }
    .cls-divider { stroke: ${layer.stroke}; stroke-width: 0.5; opacity: .35; }
    .cls-title  { font-size: 11px; font-weight: 700; fill: ${layer.color}; }
    .cls-role   { font-size: 8.5px; fill: #6c757d; }
    .cls-field  { font-size: 8.5px; fill: #185FA5; font-family: monospace; }
    .cls-method { font-size: 8.5px; fill: #2b6106; font-family: monospace; }
    .cls-bg     { fill: ${layer.light}; stroke: ${layer.stroke}; stroke-width: 0.9; rx: 7; }
    .cls-count  { font-size: 8px; fill: #adb5bd; font-style: italic; }
    .legend-box { font-size: 9px; fill: #6c757d; }
    .cls-card:hover .cls-bg { fill: ${layer.light}; filter: brightness(0.96); }
  </style>`;

  // Legend inside SVG
  const legendItems = [
    {c:"#185FA5", l:"field"},
    {c:"#2b6106", l:"method"},
    {c:"#adb5bd", l:"truncated — click card to expand"}
  ];
  let lx = startX;
  legendItems.forEach(li => {
    svg += `<rect x="${lx}" y="${PAD_Y}" width="8" height="8" rx="2" fill="${li.c}" opacity="0.75"/>`;
    svg += `<text class="legend-box" x="${lx+11}" y="${PAD_Y+7}">${li.l}</text>`;
    lx += 11 + li.l.length * 5.1 + 16;
  });

  let rowY = PAD_Y + legendH;
  for (let r = 0; r < rows; r++) {
    const rh = rowHeights[r];
    for (let c = 0; c < COL; c++) {
      const idx = r * COL + c;
      if (idx >= classes.length) break;
      const cls = classes[idx];
      const x = startX + c * (W + GAP_X);
      const y = rowY;
      const H = rh;
      const fc = Math.min(cls.fields.length, 2);
      const mc = Math.min(cls.methods.length, 3);

      svg += `<g class="cls-card" onclick="showDetail('${key}','${cls.id}')">`;
      svg += `<rect class="cls-bg" x="${x}" y="${y}" width="${W}" height="${H}" rx="7"/>`;
      svg += `<line class="cls-divider" x1="${x+6}" y1="${y+DIVIDER_Y}" x2="${x+W-6}" y2="${y+DIVIDER_Y}"/>`;

      // Title
      const titleStr = cls.id.length > 22 ? cls.id.slice(0,21)+'…' : cls.id;
      svg += `<text class="cls-title" x="${x+W/2}" y="${y+12}" text-anchor="middle" dominant-baseline="central">${titleStr}</text>`;
      const roleStr = cls.role.length > 30 ? cls.role.slice(0,29)+'…' : cls.role;
      svg += `<text class="cls-role" x="${x+W/2}" y="${y+25}" text-anchor="middle" dominant-baseline="central">${roleStr}</text>`;

      let lineY = y + HEADER_H + 3;
      for (let f = 0; f < fc; f++) {
        const lbl = cls.fields[f].replace(/[<>]/g,'');
        svg += `<text class="cls-field" x="${x+6}" y="${lineY}" dominant-baseline="central">${lbl.length>26?lbl.slice(0,25)+'…':lbl}</text>`;
        lineY += LINE_H;
      }
      if (cls.fields.length > 2) {
        svg += `<text class="cls-count" x="${x+6}" y="${lineY}" dominant-baseline="central">+${cls.fields.length-2} more fields…</text>`;
        lineY += LINE_H;
      }
      if (mc > 0) lineY += 1;
      for (let m = 0; m < mc; m++) {
        const lbl = cls.methods[m].replace(/[<>]/g,'');
        svg += `<text class="cls-method" x="${x+6}" y="${lineY}" dominant-baseline="central">${lbl.length>26?lbl.slice(0,25)+'…':lbl}</text>`;
        lineY += LINE_H;
      }
      if (cls.methods.length > 3) {
        svg += `<text class="cls-count" x="${x+6}" y="${lineY}" dominant-baseline="central">+${cls.methods.length-3} more methods…</text>`;
      }
      svg += `</g>`;
    }
    rowY += rh + GAP_Y;
  }
  svg += `</svg>`;
  document.getElementById('diagramArea').innerHTML = svg;
}

function showDetail(layerKey, classId) {
  const cls = LAYERS[layerKey].classes.find(c => c.id === classId);
  if (!cls) return;
  const layer = LAYERS[layerKey];
  document.getElementById('dpTitle').style.color = layer.color;
  document.getElementById('dpTitle').textContent = cls.id;
  document.getElementById('dpRole').textContent = cls.role;

  const fieldsEl = document.getElementById('dpFields');
  const methodsEl = document.getElementById('dpMethods');
  fieldsEl.innerHTML = '';
  methodsEl.innerHTML = '';

  if (cls.fields.length === 0 && cls.methods.length === 0) {
    fieldsEl.innerHTML = '<div style="color:#868e96;font-style:italic;font-size:12px;">No members declared.</div>';
  } else {
    if (cls.fields.length === 0) fieldsEl.innerHTML = '<div style="color:#adb5bd;font-size:12px;font-style:italic;">none</div>';
    cls.fields.forEach(f => {
      const d = document.createElement('div');
      d.className = 'detail-member field';
      d.textContent = f;
      fieldsEl.appendChild(d);
    });
    if (cls.methods.length === 0) methodsEl.innerHTML = '<div style="color:#adb5bd;font-size:12px;font-style:italic;">none</div>';
    cls.methods.forEach(m => {
      const d = document.createElement('div');
      d.className = 'detail-member method';
      d.textContent = m;
      methodsEl.appendChild(d);
    });
  }
  document.getElementById('detailPanel').classList.add('show');
}

renderDiagram('gui');
</script>
